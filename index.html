
<!-- Store Dashboard v1.0 - Live Data $(date) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Store Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Chart.js Data Labels -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
<!-- CountUp.js UMD -->
<script src="https://cdn.jsdelivr.net/npm/countup.js@2.6.2/dist/countUp.umd.js"></script>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    padding: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    margin: 0;
    color: #f9fafb;
    min-height: 100vh;
    line-height: 1.5;
  }

  h1 {
    text-align: center;
    color: #fff;
    margin: 0 0 15px 0;
    font-size: clamp(24px, 6vw, 32px);
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }

  .mode-note {
    text-align: center;
    font-size: clamp(14px, 4vw, 16px);
    color: rgba(255,255,255,0.9);
    margin-bottom: 20px;
    padding: 0 10px;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 25px;
    padding: 0 10px;
  }

  @media (min-width: 768px) {
    .controls {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 0;
    }
  }

  @media (min-width: 1024px) {
    .controls {
      gap: 25px;
    }
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    min-width: 280px;
    flex: 1;
    max-width: 100%;
  }

  @media (min-width: 768px) {
    .control-group {
      min-width: 250px;
      max-width: 300px;
    }
  }

  label {
    font-size: clamp(14px, 3.5vw, 16px);
    margin-bottom: 8px;
    color: #e5e7eb;
    font-weight: 600;
  }

  select {
    padding: 12px 16px;
    font-size: clamp(14px, 4vw, 16px);
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.15);
    color: #fff;
    min-height: 48px;
    backdrop-filter: blur(10px);
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    width: 100%;
  }

  select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
  }

  select option {
    background: #1f2937;
    color: #fff;
    padding: 10px;
  }

  /* Custom select arrow */
  .control-group::after {
    content: '▼';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin: 25px 0;
    padding: 0 10px;
  }

  @media (min-width: 768px) {
    .stats {
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      padding: 0;
    }
  }

  @media (min-width: 1024px) {
    .stats {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .stat-box {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    transition: transform 0.2s ease;
  }

  .stat-box:hover {
    transform: translateY(-2px);
  }

  @media (hover: none) {
    .stat-box:hover {
      transform: none;
    }
  }

  .stat-title {
    font-size: clamp(16px, 4vw, 18px);
    color: #fff;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .stat-extra {
    font-size: clamp(14px, 3.5vw, 16px);
    color: rgba(255,255,255,0.9);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .stat-label {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 10px;
  }

  .value {
    font-size: clamp(24px, 8vw, 32px);
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    margin: 0;
  }

  .chart-wrapper {
    width: 100%;
    height: clamp(350px, 50vh, 500px);
    max-width: 1200px;
    margin: 25px auto;
    padding: 0 10px;
  }

  .chart-container {
    width: 100%;
    height: 100%;
  }

  canvas {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    width: 100% !important;
    height: 100% !important;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
  }

  .hidden {
    display: none !important;
  }

  /* Mobile-specific optimizations */
  @media (max-width: 480px) {
    body {
      padding: 10px;
    }
    
    .controls {
      padding: 0 5px;
    }
    
    .control-group {
      min-width: 100%;
    }
    
    .stats {
      padding: 0 5px;
      gap: 15px;
    }
    
    .stat-box {
      padding: 18px 15px;
    }
    
    .chart-wrapper {
      padding: 0 5px;
      height: clamp(300px, 45vh, 400px);
    }
  }

  /* Landscape mobile */
  @media (max-height: 500px) and (orientation: landscape) {
    .chart-wrapper {
      height: 60vh;
    }
    
    h1 {
      margin-bottom: 10px;
    }
    
    .mode-note {
      display: none;
    }
  }

  /* High DPI displays */
  @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
    .stat-box, canvas {
      border-width: 0.5px;
    }
  }
</style>
</head>
<body>

<h1>🏪 Store Performance Dashboard</h1>
<div class="mode-note">
  📊 Year View: Compare stores by year | 🏢 Store View: Track one store across years
</div>

<div class="controls">
  <div class="control-group">
    <label for="modeSelect">📈 Mode</label>
    <select id="modeSelect">
      <option value="year">Year View (Compare All Stores)</option>
      <option value="store">Store View (Track One Store)</option>
    </select>
  </div>

  <div class="control-group" id="yearGroup">
    <label for="yearSelect">📅 Year</label>
    <select id="yearSelect"></select>
  </div>

  <div class="control-group" id="storeGroup">
    <label for="storeSelect">🏢 Store</label>
    <select id="storeSelect"></select>
  </div>

  <div class="control-group">
    <label for="metricSelect">📊 Metric</label>
    <select id="metricSelect">
      <option value="Store Sales">💰 Store Sales</option>
      <option value="Total Paidout">💸 Total Paidout</option>
      <option value="Transaction Count">📱 Transactions</option>
    </select>
  </div>
</div>

<div class="stats">
  <div class="stat-box">
    <div class="stat-title" id="salesTitle">Highest Sales</div>
    <div class="stat-extra" id="salesExtra"></div>
    <div class="stat-label">Store / Year</div>
    <div class="value" id="totalSales">$0</div>
  </div>
  <div class="stat-box">
    <div class="stat-title" id="paidoutTitle">Highest Paidout</div>
    <div class="stat-extra" id="paidoutExtra"></div>
    <div class="stat-label">Store / Year</div>
    <div class="value" id="totalPaidout">$0</div>
  </div>
  <div class="stat-box">
    <div class="stat-title" id="txnTitle">Highest Transactions</div>
    <div class="stat-extra" id="txnExtra"></div>
    <div class="stat-label">Store / Year</div>
    <div class="value" id="totalTransactions">0</div>
  </div>
</div>

<div class="chart-wrapper">
  <div class="chart-container">
    <canvas id="storeChart"></canvas>
  </div>
</div>

<script>
// Register datalabels plugin
Chart.register(ChartDataLabels);

let rawData = [];
let chart;

// Clean CSV numbers
function toNumber(v) {
  if (!v) return 0;
  const cleaned = String(v).replace(/[$,]/g, '').trim();
  if (cleaned === '' || cleaned.toUpperCase() === 'N/A') return 0;
  return parseFloat(cleaned);
}

// Load CSV
Papa.parse('eoy_report.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    rawData = results.data;
    initDashboard();
  }
});

function initDashboard() {
  const years = [...new Set(rawData.map(r => parseInt(r['Year'])))]?.filter(y => y).sort((a,b)=>a-b) || [];
  const stores = [...new Set(rawData.map(r => r['Store Name']))].filter(s => s).sort();

  const yearSelect = document.getElementById('yearSelect');
  const storeSelect = document.getElementById('storeSelect');

  // Clear existing options
  yearSelect.innerHTML = '';
  storeSelect.innerHTML = '';

  years.forEach(y => {
    const option = document.createElement('option');
    option.value = y;
    option.textContent = y;
    yearSelect.appendChild(option);
  });

  stores.forEach(s => {
    const option = document.createElement('option');
    option.value = s;
    option.textContent = s;
    storeSelect.appendChild(option);
  });

  // Set defaults if options exist
  if (years.length > 0) yearSelect.value = years[years.length - 1];
  if (stores.length > 0) storeSelect.value = stores[0];

  // Event listeners
  document.getElementById('modeSelect').addEventListener('change', handleModeChange);
  document.getElementById('yearSelect').addEventListener('change', updateDashboard);
  document.getElementById('storeSelect').addEventListener('change', updateDashboard);
  document.getElementById('metricSelect').addEventListener('change', updateDashboard);

  handleModeChange();
}

function handleModeChange() {
  const mode = document.getElementById('modeSelect').value;
  const yearGroup = document.getElementById('yearGroup');
  const storeGroup = document.getElementById('storeGroup');

  if (mode === 'year') {
    yearGroup.classList.remove('hidden');
    storeGroup.classList.add('hidden');
  } else {
    yearGroup.classList.add('hidden');
    storeGroup.classList.remove('hidden');
  }
  updateDashboard();
}

function updateDashboard() {
  const mode = document.getElementById('modeSelect').value;
  const yearSelect = document.getElementById('yearSelect');
  const storeSelect = document.getElementById('storeSelect');
  
  const year = parseInt(yearSelect.value);
  const store = storeSelect.value;
  const metric = document.getElementById('metricSelect').value;

  // === KPIs ===
  let salesRow, paidoutRow, txnRow;

  if (mode === 'year' && !isNaN(year)) {
    const yearData = rawData.filter(r => parseInt(r['Year']) === year);
    
    salesRow = yearData.reduce((max, row) => 
      toNumber(row['Store Sales']) > toNumber(max['Store Sales']) ? row : max, {}
    );
    
    paidoutRow = yearData.reduce((max, row) => 
      toNumber(row['Total Paidout']) > toNumber(max['Total Paidout']) ? row : max, {}
    );
    
    txnRow = yearData.reduce((max, row) => 
      toNumber(row['Transaction Count']) > toNumber(max['Transaction Count']) ? row : max, {}
    );

    document.getElementById('salesTitle').textContent = `Highest Sales (${year})`;
    document.getElementById('paidoutTitle').textContent = `Highest Paidout (${year})`;
    document.getElementById('txnTitle').textContent = `Highest Transactions (${year})`;
    
    document.getElementById('salesExtra').textContent = salesRow['Store Name'] || '';
    document.getElementById('paidoutExtra').textContent = paidoutRow['Store Name'] || '';
    document.getElementById('txnExtra').textContent = txnRow['Store Name'] || '';

  } else if (store) {
    const storeData = rawData.filter(r => r['Store Name'] === store);
    
    salesRow = storeData.reduce((max, row) => 
      toNumber(row['Store Sales']) > toNumber(max['Store Sales']) ? row : max, {}
    );
    
    paidoutRow = storeData.reduce((max, row) => 
      toNumber(row['Total Paidout']) > toNumber(max['Total Paidout']) ? row : max, {}
    );
    
    txnRow = storeData.reduce((max, row) => 
      toNumber(row['Transaction Count']) > toNumber(max['Transaction Count']) ? row : max, {}
    );

    document.getElementById('salesTitle').textContent = 'Highest Sales';
    document.getElementById('paidoutTitle').textContent = 'Highest Paidout';
    document.getElementById('txnTitle').textContent = 'Highest Transactions';
    
    document.getElementById('salesExtra').textContent = salesRow['Year'] ? `Year ${salesRow['Year']}` : '';
    document.getElementById('paidoutExtra').textContent = paidoutRow['Year'] ? `Year ${paidoutRow['Year']}` : '';
    document.getElementById('txnExtra').textContent = txnRow['Year'] ? `Year ${txnRow['Year']}` : '';
  }

  // Animate KPIs
  const salesVal = salesRow ? toNumber(salesRow['Store Sales']) : 0;
  const paidoutVal = paidoutRow ? toNumber(paidoutRow['Total Paidout']) : 0;
  const txnVal = txnRow ? toNumber(txnRow['Transaction Count']) : 0;

  // Destroy existing counters
  document.querySelectorAll('.countup').forEach(el => el.classList.remove('countup'));
  
  new countUp.CountUp('totalSales', salesVal, { 
    prefix: '$', 
    duration: 1.2,
    useEasing: true,
    useGrouping: true,
    separator: ','
  }).start();
  
  new countUp.CountUp('totalPaidout', paidoutVal, { 
    prefix: '$', 
    duration: 1.2,
    useEasing: true,
    useGrouping: true,
    separator: ','
  }).start();
  
  new countUp.CountUp('totalTransactions', txnVal, { 
    duration: 1.2,
    useEasing: true,
    useGrouping: true,
    separator: ','
  }).start();

  // === CHART ===
  let labels = [], data = [], chartTitle = '';

  if (mode === 'year' && !isNaN(year)) {
    const yearData = rawData.filter(r => parseInt(r['Year']) === year);
    labels = yearData.map(r => r['Store Name']).slice(0, 15); // Limit for mobile
    data = yearData.map(r => 
      metric === 'Transaction Count' ? toNumber(r['Transaction Count']) : toNumber(r[metric])
    ).slice(0, 15);
    chartTitle = `${metric} (${year})`;
  } else if (store) {
    const storeData = rawData.filter(r => r['Store Name'] === store).sort((a,b) => a['Year'] - b['Year']);
    labels = storeData.map(r => r['Year']);
    data = storeData.map(r => 
      metric === 'Transaction Count' ? toNumber(r['Transaction Count']) : toNumber(r[metric])
    );
    chartTitle = `${metric} - ${store}`;
  }

  const colors = [
    '#3b82f6','#10b981','#f97316','#ef4444','#8b5cf6','#06b6d4','#eab308','#ec4899',
    '#10b981','#f97316','#3b82f6','#ef4444','#8b5cf6','#06b6d4','#eab308'
  ];
  const backgroundColors = labels.map((_, i) => colors[i % colors.length]);

  if (chart) chart.destroy();

  const ctx = document.getElementById('storeChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: chartTitle,
        data: data,
        backgroundColor: backgroundColors,
        borderRadius: window.innerWidth < 768 ? 4 : 8,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        intersect: false,
        mode: 'index'
      },
      plugins: {
        legend: { display: false },
        title: {
          display: true,
          text: chartTitle,
          color: '#fff',
          font: { size: Math.min(24, window.innerWidth * 0.04), weight: 'bold' },
          padding: { top: 15, bottom: 15 }
        },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,0.9)',
          titleFont: { size: Math.min(14, window.innerWidth * 0.035) },
          bodyFont: { size: Math.min(14, window.innerWidth * 0.035) },
          cornerRadius: 8,
          displayColors: false
        },
        datalabels: {
          anchor: 'end',
          align: window.innerWidth < 768 ? 'top' : 'end',
          color: '#fff',
          font: { 
            weight: 'bold', 
            size: Math.min(12, window.innerWidth * 0.03)
          },
          formatter: function(value) {
            return metric === 'Transaction Count' 
              ? value.toLocaleString() 
              : '$' + value.toLocaleString();
          }
        }
      },
      scales: {
        x: {
          ticks: { 
            color: '#e5e7eb', 
            font: { size: Math.min(12, window.innerWidth * 0.03) },
            maxRotation: 45,
            minRotation: 0
          },
          grid: { display: false }
        },
        y: {
          beginAtZero: true,
          ticks: {
            color: '#d1d5db',
            font: { size: Math.min(12, window.innerWidth * 0.03) },
            callback: function(value) {
              return metric === 'Transaction Count' 
                ? value.toLocaleString() 
                : '$' + value.toLocaleString();
            }
          },
          grid: { color: 'rgba(255,255,255,0.1)' }
        }
      },
      animation: {
        duration: 800,
        easing: 'easeOutQuart'
      }
    },
    plugins: [ChartDataLabels]
  });

  // Handle resize for responsiveness
  window.addEventListener('resize', () => {
    if (chart) {
      chart.resize();
      chart.update('none');
    }
  });
}
</script>

</body>
</html>
